<svg width="760" height="400" viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="14">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fc2c83"/>
      <stop offset="1" stop-color="#fd5299"/>
    </linearGradient>
    <style>
      .line { opacity: 0; animation: appear 0.4s ease-out forwards; }
      @keyframes appear { to { opacity: 1; } }
      .l1  { animation-delay: 0.4s; }
      .l2  { animation-delay: 1.2s; }
      .l3  { animation-delay: 1.7s; }
      .l4  { animation-delay: 2.2s; }
      .l5  { animation-delay: 2.9s; }
      .l6  { animation-delay: 4.0s; }
      .l7  { animation-delay: 4.9s; }
      .l8  { animation-delay: 6.0s; }
      .l9  { animation-delay: 6.9s; }
      .l10 { animation-delay: 8.0s; }
      .l11 { animation-delay: 8.9s; }
      .cursor { animation: blink 1.1s step-start infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .dim { fill: #6c7078; }
      .ok { fill: #34d399; }
      .in { fill: #67e8f9; }
      .out { fill: #fd5299; }
      .txt { fill: #e5e5e8; }
    </style>
  </defs>

  <rect width="760" height="400" rx="12" fill="#18181b"/>
  <rect width="760" height="36" rx="12" fill="#232327"/>
  <rect y="24" width="760" height="12" fill="#232327"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>
  <text x="380" y="23" text-anchor="middle" class="dim" font-size="12">agent.py — one handler, every channel</text>

  <text x="24" y="66" class="txt line l1"><tspan class="dim">$</tspan> python agent.py</text>
  <text x="24" y="94" class="line l2"><tspan class="ok">✓</tspan><tspan class="txt" dx="8">email connected</tspan><tspan class="dim" dx="12">support@agents.acme.com</tspan></text>
  <text x="24" y="120" class="line l3"><tspan class="ok">✓</tspan><tspan class="txt" dx="8">telegram connected</tspan><tspan class="dim" dx="12">@acme_support_bot</tspan></text>
  <text x="24" y="146" class="line l4"><tspan class="ok">✓</tspan><tspan class="txt" dx="8">slack connected</tspan><tspan class="dim" dx="12">Acme workspace · one-click install</tspan></text>
  <text x="24" y="176" class="dim line l5">listening on 3 channels…</text>

  <text x="24" y="212" class="line l6"><tspan class="in">← telegram</tspan><tspan class="txt" dx="10">@dana: “hey — can I move my booking to Friday?”</tspan></text>
  <text x="24" y="238" class="line l7"><tspan class="out">→ replied</tspan><tspan class="dim" dx="10">same thread · 1.2s</tspan></text>

  <text x="24" y="272" class="line l8"><tspan class="in">← email</tspan><tspan class="txt" dx="10">dana@gmail.com: “Re: invoice #4411”</tspan></text>
  <text x="24" y="298" class="line l9"><tspan class="out">→ replied</tspan><tspan class="dim" dx="10">threaded · DKIM-signed · 0.9s</tspan></text>

  <text x="24" y="332" class="line l10"><tspan class="in">← slack</tspan><tspan class="txt" dx="10">#support @dana: “perfect, thanks!”</tspan></text>
  <text x="24" y="358" class="line l11"><tspan class="out">→ replied</tspan><tspan class="dim" dx="10">in thread · 0.7s</tspan><tspan class="txt cursor" dx="14">▍</tspan></text>

  <rect x="0" y="396" width="760" height="4" fill="url(#accent)"/>
</svg>
