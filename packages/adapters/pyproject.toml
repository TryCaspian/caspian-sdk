[project]
name = "caspian-adapters"
version = "0.1.0"
description = "Channel adapters for AI-agent communication - Slack, Discord, Telegram, Instagram, Facebook, X, email (SES), Google Meet, GSM-modem SMS - behind one provider interface."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
  "boto3>=1.34,<2",
  "httpx>=0.28,<1",
  "pydantic-settings>=2.10,<3",
  "cryptography>=42,<47",
]

[project.optional-dependencies]
telegram-user = ["telethon>=1.36,<2"]
modem = ["pyserial>=3.5,<4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
